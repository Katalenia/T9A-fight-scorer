<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: grid;
  grid-template-columns: 30% 35% 35%;
  grid-auto-rows: 3.5em;
  padding: 0px;
  touch-action: manipulation;
}
div {
  background-color: #f1f1f1;
  border: 1px solid black;
  padding: 0.3em;
  font-size: 2em;
  text-align: center;
  -webkit-touch-callout: none;
	-webkit-user-select: none;
	-khtml-user-select: none;
	-moz-user-select: none;
	-ms-user-select: none;
	user-select: none;
  touch-action: manipulation;
}

.container button {
  font-size: 2em;
  padding: 0.3em;
  text-align: center;
}
</style>

<title>T9A fight scorer</title>
</head>
<body>

<div class="container">
  <button id="reset">Reset</button>
  <div>Me</div>
  <div>Opponent</div>

  <div>Charges</div>
  <div id="my_counter_1">- &nbsp;&nbsp;&nbsp;<toto id="my_counter_1#">0</toto>&nbsp;&nbsp;&nbsp; +</div>
  <div id="opp_counter_1">- &nbsp;&nbsp;&nbsp;<toto id="opp_counter_1#">0</toto>&nbsp;&nbsp;&nbsp; +</div>

  <div>Banners</div>
  <div id="my_counter_2">- &nbsp;&nbsp;&nbsp;<toto id="my_counter_2#">0</toto>&nbsp;&nbsp;&nbsp; +</div>
  <div id="opp_counter_2">- &nbsp;&nbsp;&nbsp;<toto id="opp_counter_2#">0</toto>&nbsp;&nbsp;&nbsp; +</div>

  <div>Ranks</div>
  <div id="my_counter_3">- &nbsp;&nbsp;&nbsp;<toto id="my_counter_3#">0</toto>&nbsp;&nbsp;&nbsp; +</div>
  <div id="opp_counter_3">- &nbsp;&nbsp;&nbsp;<toto id="opp_counter_3#">0</toto>&nbsp;&nbsp;&nbsp; +</div>

  <div>Wounds</div>
  <div id="my_counter_4">- &nbsp;&nbsp;&nbsp;<toto id="my_counter_4#">0</toto>&nbsp;&nbsp;&nbsp; +</div>
  <div id="opp_counter_4">- &nbsp;&nbsp;&nbsp;<toto id="opp_counter_4#">0</toto>&nbsp;&nbsp;&nbsp; +</div>

  <div>Other</div>
  <div id="my_counter_5">- &nbsp;&nbsp;&nbsp;<toto id="my_counter_5#">0</toto>&nbsp;&nbsp;&nbsp; +</div>
  <div id="opp_counter_5">- &nbsp;&nbsp;&nbsp;<toto id="opp_counter_5#">0</toto>&nbsp;&nbsp;&nbsp; +</div>

  <div><b>Total</b></div>
  <div id="my_total"><b>0</b></div>
  <div id="opp_total"><b>0</b></div>
</div>

<h1 id="final_score" style="font-size: 4em;">Final score: 0</h1>


  <script>

    function update_totals() {
      my_score = 0;
      for (i=1; i<=5; i++) {
        name = "my_counter_" + i;
        my_score += parseInt(document.getElementById(name+"#").innerHTML, 10);
      }

      opp_score = 0;
      for (i=1; i<=5; i++) {
        name = "opp_counter_" + i;
        opp_score += parseInt(document.getElementById(name+"#").innerHTML, 10);
      }

      document.getElementById("my_total").innerHTML = "<b>" + my_score + "</b>";
      document.getElementById("opp_total").innerHTML = "<b>" + opp_score + "</b>";

      document.getElementById("final_score").innerHTML = "Final score: " + (my_score -opp_score);

    }

    function reset(e) {
      for (i=1; i<=5; i++) {
        name = "my_counter_" + i;
        document.getElementById(name+"#").innerHTML = "0";
      }

      opp_score = 0
      for (i=1; i<=5; i++) {
        name = "opp_counter_" + i;
        document.getElementById(name+"#").innerHTML = "0";
      }

      update_totals();
    }

    function click_event(div, name) {
      return function(e) {
        // Get the width and horizontal position of the div
        const rect = div.getBoundingClientRect();
        const clickX = e.clientX; // X coordinate of the click

        // Calculate the center of the div
        const centerX = rect.left + rect.width / 2;

        x = parseInt(document.getElementById(name+"#").innerHTML, 10);

        // Determine if click was on left or right
        if (clickX < centerX) {
          // Handle left side logic
          document.getElementById(name+"#").innerHTML = (x-1).toString();
        } else {
          // Handle right side logic
          document.getElementById(name+"#").innerHTML = (x+1).toString();
        }

        update_totals();
      };
    }

    document.getElementById("reset").onclick = reset;


  	for (i=1; i<=5; i++) {
      name = "my_counter_" + i;
      div = document.getElementById(name);
      div.addEventListener("click", click_event(div, name));
    }

    for (i=1; i<=5; i++) {
      name = "opp_counter_" + i;
      div = document.getElementById(name);
      div.addEventListener("click", click_event(div, name));
    }
  </script>
</body>
</html>
